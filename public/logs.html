<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NEXA BOT - Logs</title>
    <meta http-equiv="refresh" content="5">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            background: #0a0a0a; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            padding: 20px;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-radius: 10px;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        h1 { 
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            font-size: 2em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 0.9em;
        }
        .logs-container {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .log { 
            margin: 8px 0;
            padding: 8px 12px;
            border-left: 3px solid #0f0;
            background: rgba(0, 255, 0, 0.05);
            border-radius: 4px;
            transition: all 0.3s;
        }
        .log:hover {
            background: rgba(0, 255, 0, 0.1);
            transform: translateX(5px);
        }
        .success { 
            color: #0f0; 
            border-left-color: #0f0;
            background: rgba(0, 255, 0, 0.05);
        }
        .error { 
            color: #f00; 
            border-left-color: #f00;
            background: rgba(255, 0, 0, 0.05);
        }
        .warning { 
            color: #ff0; 
            border-left-color: #ff0;
            background: rgba(255, 255, 0, 0.05);
        }
        .info { 
            color: #0ff; 
            border-left-color: #0ff;
            background: rgba(0, 255, 255, 0.05);
        }
        .timestamp {
            color: #888;
            font-size: 0.9em;
        }
        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
            font-style: italic;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #0f0;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1s infinite;
            box-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ NEXA BOT LOGS</h1>
        <p class="subtitle"><span class="live-indicator"></span>Live Monitoring • Auto-refresh every 5 seconds</p>
    </div>
    <div class="logs-container">
        <div id="logs"></div>
    </div>
    <script>
        async function loadLogs() {
            try {
                const response = await fetch('/lilygo/logs');
                const data = await response.json();
                const container = document.getElementById('logs');
                container.innerHTML = '';
                
                if (!data.logs || data.logs.length === 0) {
                    container.innerHTML = '<div class="empty-state">No logs available yet...</div>';
                    return;
                }
                
                data.logs.forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'log';
                    
                    if (log.includes('✓')) {
                        div.classList.add('success');
                    } else if (log.includes('X')) {
                        div.classList.add('error');
                    } else if (log.includes('!')) {
                        div.classList.add('warning');
                    } else {
                        div.classList.add('info');
                    }
                    
                    div.textContent = log;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading logs:', error);
                document.getElementById('logs').innerHTML = 
                    '<div class="log error">❌ Error connecting to server</div>';
            }
        }
        
        // Load logs immediately
        loadLogs();
        
        // Reload every 5 seconds
        setInterval(loadLogs, 5000);
    </script>
</body>
</html>
